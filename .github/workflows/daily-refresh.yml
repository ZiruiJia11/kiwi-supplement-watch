name: Daily live deal refresh

on:
  schedule:
    # 20:00 UTC is roughly 08:00 NZST / 09:00 NZDT.
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-live-deal-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh live data
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect live prices
        run: npm run collect:live

      - name: Build dashboard
        run: npm run build

      - name: Smoke test build
        run: npm run smoke

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/live-deals.json
          if git diff --cached --quiet; then
            echo "No live data changes to commit."
          else
            git commit -m "Refresh live supplement deal data"
            git push
          fi

      - name: Deploy to Vercel when secrets are configured
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        run: npx vercel deploy --prod --yes --token "$VERCEL_TOKEN"
